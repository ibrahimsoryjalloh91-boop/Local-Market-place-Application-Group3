<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Marketplace</title>
    <style>
      :root { color-scheme: light; }
      body { font-family: Arial, sans-serif; margin: 0; background: #f4f7fb; color: #1f2937; }
      header { background: linear-gradient(135deg, #0f766e, #16a34a); color: white; padding: 24px; }
      .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
      .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08); }
      .pill { display: inline-block; background: #dcfce7; color: #166534; padding: 4px 8px; border-radius: 999px; font-size: 12px; margin-right: 8px; }
      form { display: grid; gap: 10px; }
      input, select, textarea, button { font: inherit; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
      button { background: #0f766e; color: white; cursor: pointer; border: none; }
      button.secondary { background: #2563eb; }
      .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 16px 0; }
      .stat { background: white; padding: 16px; border-radius: 10px; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <h1>Local Market Place</h1>
        <p>Connect buyers, sellers, and artisans in your community without big e-commerce platforms.</p>
      </div>
    </header>

    <div class="container">
      <div class="stats" id="summary"></div>

      <div class="grid">
        <section class="card">
          <h2>Join the community</h2>
          <form id="registerForm">
            <input name="name" placeholder="Your name" required />
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <select name="role">
              <option value="seller">Seller</option>
              <option value="buyer">Buyer</option>
              <option value="artisan">Artisan</option>
            </select>
            <input name="location" placeholder="Community / town" />
            <button type="submit">Create account</button>
          </form>
          <p id="registerMessage"></p>
        </section>

        <section class="card">
          <h2>Sign in</h2>
          <form id="loginForm">
            <input name="email" type="email" placeholder="Email" required />
            <input name="password" type="password" placeholder="Password" required />
            <button type="submit">Log in</button>
          </form>
          <p id="loginMessage"></p>
        </section>

        <section class="card">
          <h2>Post a listing</h2>
          <form id="listingForm">
            <input name="title" placeholder="Item or service" required />
            <textarea name="description" placeholder="Describe what you are offering" required></textarea>
            <input name="price" placeholder="Price" required />
            <select name="category">
              <option>Food</option>
              <option>Electronics</option>
              <option>Services</option>
              <option>Clothing</option>
              <option>Crafts</option>
              <option>Other</option>
            </select>
            <input name="location" placeholder="Location" />
            <select name="type">
              <option value="product">Product</option>
              <option value="service">Service</option>
            </select>
            <button type="submit" class="secondary">Publish listing</button>
          </form>
          <p id="listingMessage"></p>
        </section>
      </div>

      <section class="card" style="margin-top: 20px;">
        <h2>Browse local listings</h2>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px;">
          <input id="searchInput" placeholder="Search listings" />
          <select id="filterCategory">
            <option value="All">All categories</option>
            <option>Food</option>
            <option>Electronics</option>
            <option>Services</option>
            <option>Clothing</option>
            <option>Crafts</option>
            <option>Other</option>
          </select>
        </div>
        <div id="listings"></div>
      </section>
    </div>

    <script>
      const summaryEl = document.getElementById('summary');
      const listingsEl = document.getElementById('listings');

      async function loadSummary() {
        const response = await fetch('/api/community-summary');
        const summary = await response.json();
        summaryEl.innerHTML = `
          <div class="stat"><strong>${summary.users}</strong><div>Community members</div></div>
          <div class="stat"><strong>${summary.listings}</strong><div>Active listings</div></div>
          <div class="stat"><strong>${summary.categories.length}</strong><div>Categories available</div></div>
        `;
      }

      async function loadListings() {
        const search = document.getElementById('searchInput').value;
        const category = document.getElementById('filterCategory').value;
        const response = await fetch(`/api/products?search=${encodeURIComponent(search)}&category=${encodeURIComponent(category)}`);
        const listings = await response.json();

        if (!listings.length) {
          listingsEl.innerHTML = '<p>No listings yet. Be the first to add one.</p>';
          return;
        }

        listingsEl.innerHTML = listings.map((item) => `
          <div class="card" style="margin-top: 12px;">
            <h3>${item.title}</h3>
            <p>${item.description}</p>
            <div>
              <span class="pill">${item.category}</span>
              <span class="pill">${item.type}</span>
            </div>
            <p><strong>Price:</strong> ${item.price}</p>
            <p><strong>Seller:</strong> ${item.vendorName}</p>
            <p><strong>Location:</strong> ${item.location}</p>
          </div>
        `).join('');
      }

      document.getElementById('registerForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const payload = Object.fromEntries(formData);
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        document.getElementById('registerMessage').textContent = result.success ? 'Account created successfully.' : result.error;
        if (result.success) {
          event.target.reset();
          loadSummary();
        }
      });

      document.getElementById('loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const payload = Object.fromEntries(formData);
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const result = await response.json();
        document.getElementById('loginMessage').textContent = result.success ? `Welcome, ${result.user.name}!` : result.error;
      });

      document.getElementById('listingForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.target);
        const payload = Object.fromEntries(formData);
        const response = await fetch('/api/products', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payload, vendorEmail: 'visitor@marketplace.sl', vendorName: 'Community Member' }),
        });
        const result = await response.json();
        document.getElementById('listingMessage').textContent = result.success ? 'Listing published successfully.' : result.error;
        if (result.success) {
          event.target.reset();
          loadSummary();
          loadListings();
        }
      });

        let searchTimeout;
      document.getElementById('searchInput').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(loadListings, 300);
      });

      document.getElementById('searchInput').addEventListener('input', loadListings);
      document.getElementById('filterCategory').addEventListener('change', loadListings);

      loadSummary();
      loadListings();
    </script>
  </body>
</html>
